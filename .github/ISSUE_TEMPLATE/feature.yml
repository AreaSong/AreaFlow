name: Feature
description: Propose a product or platform change
body:
  - type: textarea
    id: problem
    attributes: {label: Problem and goal}
    validations: {required: true}
  - type: textarea
    id: scope
    attributes: {label: Scope and non-goals}
    validations: {required: true}
  - type: dropdown
    id: risk
    attributes: {label: Change level, options: [L1, L2, L3, L4]}
    validations: {required: true}
  - type: textarea
    id: acceptance
    attributes: {label: Acceptance, rollout, rollback and retirement}
    validations: {required: true}
