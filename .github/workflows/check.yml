name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            desktop/package-lock.json
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm ci --prefix desktop
      - run: make check

  integration:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AREAFLOW_DATABASE_URL: postgres://areaflow:areaflow@127.0.0.1:54329/areaflow?sslmode=disable
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: areaflow
          POSTGRES_PASSWORD: areaflow
          POSTGRES_DB: areaflow
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U areaflow -d areaflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: cd web && npx playwright install --with-deps chromium
      - run: make production-smoke
      - run: make load-check
