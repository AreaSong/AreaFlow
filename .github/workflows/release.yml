name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with: {go-version: "1.25.x", cache: true}
      - uses: actions/setup-node@v4
        with: {node-version: 24, cache: npm}
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm ci --prefix desktop
      - run: make check
      - run: node scripts/check-license-policy.mjs
      - run: node scripts/check-release-contract.mjs "${GITHUB_REF_NAME}"

  cli:
    needs: validate
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, goos: linux, goarch: amd64, suffix: linux-amd64}
          - {os: ubuntu-latest, goos: linux, goarch: arm64, suffix: linux-arm64}
          - {os: macos-latest, goos: darwin, goarch: arm64, suffix: darwin-arm64}
          - {os: windows-latest, goos: windows, goarch: amd64, suffix: windows-amd64.exe}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with: {go-version: "1.25.x", cache: true}
      - shell: bash
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X github.com/areasong/areaflow/internal/version.Version=${VERSION} -X github.com/areasong/areaflow/internal/version.Commit=${GITHUB_SHA} -X github.com/areasong/areaflow/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/areaflow-${{ matrix.suffix }}" ./cmd/areaflow
      - uses: actions/upload-artifact@v4
        with: {name: "cli-${{ matrix.suffix }}", path: dist/*}

  web:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24, cache: npm, cache-dependency-path: web/package-lock.json}
      - run: npm ci --prefix web
      - run: npm run build --prefix web
      - run: tar -C web/dist -czf areaflow-web-${GITHUB_REF_NAME#v}.tar.gz .
      - uses: actions/upload-artifact@v4
        with: {name: web, path: areaflow-web-*.tar.gz}

  desktop:
    needs: validate
    strategy:
      fail-fast: false
      matrix: {platform: [macos-latest, ubuntu-22.04, windows-latest]}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24, cache: npm, cache-dependency-path: desktop/package-lock.json}
      - uses: dtolnay/rust-toolchain@stable
      - if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci --prefix desktop
      - uses: tauri-apps/tauri-action@v0
        with: {projectPath: desktop}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  image:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs: {digest: "${{ steps.build.outputs.digest }}"}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - id: meta
        uses: docker/metadata-action@v5
        with: {images: "ghcr.io/${{ github.repository }}", tags: "type=semver,pattern={{version}}"}
      - id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
      - uses: anchore/sbom-action@v0
        with: {image: "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}", format: spdx-json, output-file: sbom.spdx.json}
      - uses: anchore/sbom-action@v0
        with: {image: "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}", format: cyclonedx-json, output-file: sbom.cyclonedx.json}
      - uses: aquasecurity/trivy-action@0.30.0
        with: {image-ref: "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}", severity: HIGH,CRITICAL, exit-code: "1"}
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY}@${{ steps.build.outputs.digest }}"
      - uses: actions/attest-build-provenance@v2
        with: {subject-name: "ghcr.io/${{ github.repository }}", subject-digest: "${{ steps.build.outputs.digest }}", push-to-registry: true}
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json

  publish:
    needs: [cli, web, desktop, image]
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {path: release-assets, merge-multiple: true}
      - run: cd release-assets && find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/**/*
