groups:
  - name: areaflow-slo
    rules:
      - alert: AreaFlowAvailabilityBudgetBurn
        expr: sum(rate(areaflow_http_requests_total{status=~"5.."}[15m])) / clamp_min(sum(rate(areaflow_http_requests_total[15m])), 0.001) > 0.01
        for: 10m
        labels: {severity: page}
        annotations: {summary: "AreaFlow is consuming the 99.9% availability error budget"}
      - alert: AreaFlowReadLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(areaflow_http_request_duration_seconds_bucket{method="GET"}[10m]))) > 0.5
        for: 15m
        labels: {severity: ticket}
        annotations: {summary: "AreaFlow read p95 exceeds 500ms"}
      - alert: AreaFlowWriteLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(areaflow_http_request_duration_seconds_bucket{method!="GET"}[10m]))) > 1
        for: 15m
        labels: {severity: ticket}
        annotations: {summary: "AreaFlow write p95 exceeds 1s"}
      - alert: AreaFlowDependencyUnavailable
        expr: min_over_time(areaflow_dependency_ready[5m]) < 1
        for: 5m
        labels: {severity: page}
        annotations: {summary: "AreaFlow dependency is not ready"}
      - alert: AreaFlowDatabasePoolSaturation
        expr: areaflow_database_pool_acquired_connections / clamp_min(areaflow_database_pool_max_connections, 1) > 0.9
        for: 10m
        labels: {severity: ticket}
        annotations: {summary: "AreaFlow PostgreSQL pool utilization exceeds 90%"}
      - alert: AreaFlowDependencyOperationErrorRateHigh
        expr: sum by (dependency) (rate(areaflow_dependency_operations_total{status="error"}[10m])) / clamp_min(sum by (dependency) (rate(areaflow_dependency_operations_total[10m])), 0.001) > 0.05 and sum by (dependency) (rate(areaflow_dependency_operations_total[10m])) > 0.1
        for: 10m
        labels: {severity: ticket}
        annotations: {summary: "AreaFlow dependency operation error rate exceeds 5%"}
