  "components": {
    "securitySchemes":{"bearerAuth":{"type":"http","scheme":"bearer"},"sessionCookie":{"type":"apiKey","in":"cookie","name":"areaflow_session"}},
    "pathItems":{
      "PublicRead":{"get":{"security":[],"responses":{"200":{"description":"Successful response"},"503":{"$ref":"#/components/responses/Problem"}}}},
      "Read":{"get":{"responses":{"200":{"description":"Successful response"},"401":{"$ref":"#/components/responses/Problem"},"403":{"$ref":"#/components/responses/Problem"},"404":{"$ref":"#/components/responses/Problem"}}}},
      "Write":{"post":{"responses":{"200":{"description":"Command accepted"},"201":{"description":"Resource created"},"400":{"$ref":"#/components/responses/Problem"},"401":{"$ref":"#/components/responses/Problem"},"403":{"$ref":"#/components/responses/Problem"},"404":{"$ref":"#/components/responses/Problem"},"409":{"$ref":"#/components/responses/Problem"},"413":{"$ref":"#/components/responses/Problem"},"429":{"$ref":"#/components/responses/Problem"}}}},
      "ReadWrite":{"get":{"responses":{"200":{"description":"Successful response"},"401":{"$ref":"#/components/responses/Problem"},"403":{"$ref":"#/components/responses/Problem"},"404":{"$ref":"#/components/responses/Problem"}}},"post":{"responses":{"200":{"description":"Command accepted"},"201":{"description":"Resource created"},"400":{"$ref":"#/components/responses/Problem"},"401":{"$ref":"#/components/responses/Problem"},"403":{"$ref":"#/components/responses/Problem"},"404":{"$ref":"#/components/responses/Problem"},"409":{"$ref":"#/components/responses/Problem"},"413":{"$ref":"#/components/responses/Problem"},"429":{"$ref":"#/components/responses/Problem"}}}}
    },
    "responses":{"Problem":{"description":"RFC 7807 problem details","content":{"application/problem+json":{"schema":{"$ref":"#/components/schemas/Problem"}}}}},
    "schemas":{
      "Problem":{"type":"object","required":["type","title","status","detail"],"properties":{"type":{"type":"string"},"title":{"type":"string"},"status":{"type":"integer"},"detail":{"type":"string"},"error":{"type":"string"},"request_id":{"type":"string"}}},
      "RoleBinding":{"type":"object","required":["id","role","status","reason","created_at"],"properties":{"id":{"type":"integer","format":"int64"},"project_id":{"type":"integer","format":"int64"},"project_key":{"type":"string"},"user_id":{"type":"integer","format":"int64"},"team_id":{"type":"integer","format":"int64"},"role":{"type":"string","enum":["platform_admin","project_admin","operator","approver","auditor","viewer"]},"status":{"type":"string"},"reason":{"type":"string"},"expires_at":{"type":"string","format":"date-time"},"created_at":{"type":"string","format":"date-time"}}}
    }
